<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Pannello Articoli — MotoDeals</title>

<link rel="icon" type="image/png" href="assets/logo-hex.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* ===== stili specifici del pannello admin ===== */
  body{padding-bottom:60px}
  .admin-bar{position:sticky;top:0;z-index:50;background:rgba(13,13,18,.86);
    backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
  .admin-bar .inner{display:flex;align-items:center;gap:16px;height:70px;flex-wrap:wrap}
  .admin-bar img{height:30px}
  .admin-bar .ttl{font-weight:800;font-size:18px}
  .admin-bar .spacer{flex:1}
  .admin-wrap{width:min(var(--maxw),94vw);margin-inline:auto;padding:28px 0}

  .btn-sm{padding:9px 15px;font-size:14px;border-radius:11px}
  .btn-line{background:var(--surface);border:1px solid var(--border-strong);color:#fff}
  .btn-line:hover{border-color:var(--orange);color:var(--orange)}
  .btn-danger{background:rgba(229,72,72,.12);border:1px solid rgba(229,72,72,.4);color:#ff8585}
  .btn-danger:hover{background:rgba(229,72,72,.2)}

  .banner{display:flex;gap:12px;align-items:flex-start;background:rgba(255,138,30,.08);
    border:1px solid rgba(255,138,30,.28);border-radius:14px;padding:14px 18px;margin-bottom:24px;
    color:var(--orange-2);font-size:14px;line-height:1.5}
  .banner b{color:var(--orange)}

  .toolbar-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .count{color:var(--muted);font-size:14px}

  /* lista articoli */
  .adm-list{display:flex;flex-direction:column;gap:12px}
  .adm-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:var(--surface);
    border:1px solid var(--border);border-radius:14px;padding:14px;transition:border-color .15s}
  .adm-row:hover{border-color:var(--border-strong)}
  .adm-row .thumb{width:84px;height:58px;flex:0 0 auto;border-radius:9px;object-fit:cover;
    background:var(--surface-2);border:1px solid var(--border)}
  .adm-row .info{flex:1 1 220px;min-width:0}
  .adm-row .info h4{font-size:16px;font-weight:700;margin-bottom:5px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .adm-row .info .sub{display:flex;gap:9px;align-items:center;flex-wrap:wrap;color:var(--muted-2);font-size:12.5px}
  .adm-row .acts{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
  .adm-row .acts button,.adm-row .acts a{padding:7px 11px;font-size:12.5px;border-radius:9px;cursor:pointer;
    font-weight:600;font-family:inherit;border:1px solid var(--border-strong);background:var(--surface-2);color:#fff;
    display:inline-flex;align-items:center;transition:.15s;white-space:nowrap}
  .adm-row .acts button:hover,.adm-row .acts a:hover{border-color:var(--orange);color:var(--orange)}
  .adm-row .acts .del:hover{border-color:#ff8585;color:#ff8585}

  /* form editor */
  .adm-form{display:grid;gap:18px;max-width:880px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
  .field{display:flex;flex-direction:column;gap:7px}
  .field label{font-size:13px;font-weight:600;color:var(--muted)}
  .field .hint{font-size:12px;color:var(--muted-2);font-weight:400}
  .inp,.editor{background:var(--surface);border:1px solid var(--border-strong);border-radius:11px;
    color:#fff;font-family:inherit;font-size:15px;padding:12px 14px;width:100%;transition:border-color .15s}
  .inp:focus,.editor:focus{outline:none;border-color:var(--orange)}
  textarea.inp{resize:vertical;min-height:74px;line-height:1.5}
  select.inp{appearance:none;cursor:pointer}
  .cover-preview{margin-top:10px;max-height:160px;border-radius:11px;border:1px solid var(--border);display:none}

  /* WYSIWYG toolbar */
  .toolbar{display:flex;gap:5px;flex-wrap:wrap;background:var(--surface-2);
    border:1px solid var(--border-strong);border-bottom:none;border-radius:11px 11px 0 0;padding:8px}
  .toolbar button{font-family:inherit;font-size:14px;font-weight:600;color:#dcdce4;cursor:pointer;
    background:transparent;border:1px solid transparent;border-radius:8px;padding:7px 11px;min-width:36px;transition:.12s}
  .toolbar button:hover{background:var(--surface);border-color:var(--border-strong);color:#fff}
  .tb-sep{width:1px;align-self:stretch;background:var(--border-strong);margin:2px 4px}
  .editor{border-radius:0 0 11px 11px;min-height:340px;overflow-y:auto;max-height:60vh}
  .editor:empty:before{content:attr(data-ph);color:var(--muted-2)}
  /* il corpo nell'editor eredita la tipografia di .article-body via classe applicata in JS */

  /* modale anteprima / messaggi */
  .modal-bg{position:fixed;inset:0;background:rgba(5,5,9,.72);backdrop-filter:blur(4px);
    z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .modal-bg.open{display:flex}
  .modal{background:var(--bg-2);border:1px solid var(--border-strong);border-radius:20px;
    width:min(820px,100%);box-shadow:var(--shadow);position:relative}
  .modal .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-2);
    border-radius:20px 20px 0 0}
  .modal .modal-head h3{font-size:16px;font-weight:700}
  .modal .x{cursor:pointer;background:var(--surface);border:1px solid var(--border-strong);color:#fff;
    width:34px;height:34px;border-radius:9px;font-size:18px;line-height:1;display:grid;place-items:center}
  .modal .modal-body{padding:26px 30px 34px}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--surface);border:1px solid var(--orange);color:#fff;padding:13px 22px;border-radius:12px;
    font-size:14px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:200}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .hidden{display:none !important}
  @media (max-width:980px){
    .adm-row .acts{flex:1 1 100%;justify-content:flex-start;margin-top:2px}
  }
  @media (max-width:680px){
    .grid-2,.grid-3{grid-template-columns:1fr}
    .adm-row .info{flex:1 1 60%}
  }
</style>
</head>
<body>

<!-- ============ APP BAR ============ -->
<header class="admin-bar">
  <div class="wrap inner">
    <img src="assets/logo-horizontal.png" alt="MotoDeals" />
    <span class="ttl">Pannello Articoli</span>
    <span class="spacer"></span>
    <a class="btn btn-line btn-sm" href="blog.html" target="_blank" rel="noopener">Apri il blog ↗</a>
    <button class="btn btn-primary btn-sm" id="btnExport" type="button">⬇ Esporta articles-data.js</button>
  </div>
</header>

<main class="admin-wrap">

  <!-- ---------- VISTA LISTA ---------- -->
  <section id="viewList">
    <div class="banner">
      <span>ℹ️</span>
      <div>Le modifiche vengono salvate <b>nel tuo browser</b>. Per pubblicarle davvero sul sito, premi
      <b>“Esporta articles-data.js”</b>, poi sostituisci il file <b>articles-data.js</b> nella cartella del sito e ricaricalo online.</div>
    </div>

    <div class="toolbar-row">
      <button class="btn btn-primary btn-sm" id="btnNew" type="button">＋ Nuovo articolo</button>
      <button class="btn btn-line btn-sm" id="btnReset" type="button">↺ Ripristina dal file pubblicato</button>
      <span class="spacer" style="flex:1"></span>
      <span class="count" id="count"></span>
    </div>

    <div class="adm-list" id="list"></div>
  </section>

  <!-- ---------- VISTA EDITOR ---------- -->
  <section id="viewEdit" class="hidden">
    <div class="toolbar-row">
      <button class="btn btn-line btn-sm" id="btnBack" type="button">← Torna alla lista</button>
      <span class="spacer" style="flex:1"></span>
      <button class="btn btn-line btn-sm" id="btnPreview" type="button">👁 Anteprima</button>
      <button class="btn btn-primary btn-sm" id="btnSave" type="button">💾 Salva</button>
    </div>

    <form class="adm-form" id="form" onsubmit="return false">
      <div class="field">
        <label for="f-title">Titolo *</label>
        <input class="inp" id="f-title" type="text" placeholder="Es. I 5 caschi migliori sotto i 500€" />
      </div>

      <div class="grid-2">
        <div class="field">
          <label for="f-slug">Slug <span class="hint">(parte finale dell'URL)</span></label>
          <input class="inp" id="f-slug" type="text" placeholder="i-5-caschi-migliori-sotto-i-500-euro" />
        </div>
        <div class="field">
          <label for="f-date">Data</label>
          <input class="inp" id="f-date" type="date" />
        </div>
      </div>

      <div class="grid-3">
        <div class="field">
          <label for="f-category">Categoria</label>
          <input class="inp" id="f-category" type="text" list="catlist" placeholder="Caschi" />
          <datalist id="catlist"></datalist>
        </div>
        <div class="field">
          <label for="f-tags">Tag <span class="hint">(separati da virgola)</span></label>
          <input class="inp" id="f-tags" type="text" placeholder="caschi, sicurezza" />
        </div>
        <div class="field">
          <label for="f-status">Stato</label>
          <select class="inp" id="f-status">
            <option value="draft">Bozza</option>
            <option value="published">Pubblicato</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="f-cover">Immagine di copertina <span class="hint">(percorso "assets/..." o URL — oppure carica un file)</span></label>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <input class="inp" id="f-cover" type="text" list="assetlist" placeholder="assets/post-casco.png" style="flex:1;min-width:220px" />
          <button class="btn btn-line btn-sm" id="btnCoverUpload" type="button">📁 Carica file</button>
        </div>
        <datalist id="assetlist">
          <option value="assets/post-casco.png"></option>
          <option value="assets/post-giacca.png"></option>
          <option value="assets/post-template.png"></option>
          <option value="assets/banner.png"></option>
        </datalist>
        <img class="cover-preview" id="coverPreview" alt="anteprima copertina" />
      </div>

      <div class="field">
        <label for="f-excerpt">Riassunto <span class="hint">(breve, usato nelle anteprime; se vuoto lo ricavo dal testo)</span></label>
        <textarea class="inp" id="f-excerpt" placeholder="Una o due frasi che invogliano alla lettura."></textarea>
      </div>

      <div class="field">
        <label>Corpo dell'articolo</label>
        <div class="toolbar" id="toolbar">
          <button type="button" data-cmd="formatBlock" data-val="<h2>" title="Titolo">H2</button>
          <button type="button" data-cmd="formatBlock" data-val="<h3>" title="Sottotitolo">H3</button>
          <button type="button" data-cmd="formatBlock" data-val="<p>" title="Paragrafo">¶</button>
          <span class="tb-sep"></span>
          <button type="button" data-cmd="bold" title="Grassetto"><b>B</b></button>
          <button type="button" data-cmd="italic" title="Corsivo"><i>I</i></button>
          <span class="tb-sep"></span>
          <button type="button" data-cmd="insertUnorderedList" title="Elenco puntato">• Lista</button>
          <button type="button" data-cmd="insertOrderedList" title="Elenco numerato">1. Lista</button>
          <button type="button" data-cmd="formatBlock" data-val="<blockquote>" title="Citazione">❝</button>
          <span class="tb-sep"></span>
          <button type="button" data-act="link" title="Inserisci link">🔗 Link</button>
          <button type="button" data-act="image" title="Inserisci immagine">🖼 Immagine</button>
          <span class="tb-sep"></span>
          <button type="button" data-cmd="removeFormat" title="Rimuovi formattazione">✕ Pulisci</button>
        </div>
        <div class="editor article-body" id="f-body" contenteditable="true" data-ph="Scrivi qui l'articolo…"></div>
      </div>

      <div class="toolbar-row" style="margin-top:6px">
        <button class="btn btn-primary" id="btnSave2" type="button">💾 Salva articolo</button>
        <button class="btn btn-line" id="btnPreview2" type="button">👁 Anteprima</button>
        <button class="btn btn-line" id="btnBack2" type="button">Annulla</button>
      </div>
    </form>
  </section>
</main>

<!-- file inputs nascosti -->
<input type="file" id="coverFile" accept="image/*" class="hidden" />
<input type="file" id="bodyImgFile" accept="image/*" class="hidden" />

<!-- modale (anteprima + export reminder) -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle">Anteprima</h3><div class="x" id="modalClose">×</div></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="articles-data.js"></script>
<script>
  const LS_KEY = 'motodeals_articles_v1';

  // ---------- helpers ----------
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const fmtDate = (iso) => {
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return esc(iso || '');
    return d.toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
  };
  const slugify = (s) => String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,80);
  const todayISO = () => new Date().toISOString().slice(0,10);

  function sanitize(html){
    const tpl = document.createElement('template');
    tpl.innerHTML = html || '';
    tpl.content.querySelectorAll('script,style,iframe,object,embed,link,meta,form').forEach(n=>n.remove());
    tpl.content.querySelectorAll('*').forEach(el=>{
      [...el.attributes].forEach(attr=>{
        const name = attr.name.toLowerCase();
        const val = (attr.value||'').trim().toLowerCase();
        if(name.startsWith('on')) el.removeAttribute(attr.name);
        else if((name==='href'||name==='src') && val.startsWith('javascript:')) el.removeAttribute(attr.name);
      });
    });
    return tpl.innerHTML;
  }

  // ---------- storage ----------
  function loadArticles(){
    try { const raw = localStorage.getItem(LS_KEY); if(raw) return JSON.parse(raw); } catch(e){}
    return JSON.parse(JSON.stringify(window.MOTODEALS_ARTICLES || []));
  }
  function persist(){ try { localStorage.setItem(LS_KEY, JSON.stringify(articles)); } catch(e){ alert('Spazio del browser esaurito: esporta il file per non perdere il lavoro.'); } }

  let articles = loadArticles();
  let editingId = null;

  // ---------- toast ----------
  let toastT;
  function toast(msg){
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2600);
  }

  // ---------- view switch ----------
  function showList(){ $('viewEdit').classList.add('hidden'); $('viewList').classList.remove('hidden'); renderList(); window.scrollTo(0,0); }
  function showEdit(){ $('viewList').classList.add('hidden'); $('viewEdit').classList.remove('hidden'); window.scrollTo(0,0); }

  // ---------- list ----------
  function renderList(){
    const list = $('list');
    const sorted = [...articles].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const pub = articles.filter(a=>a.status==='published').length;
    $('count').textContent = `${articles.length} articoli · ${pub} pubblicati · ${articles.length-pub} bozze`;

    if(!sorted.length){ list.innerHTML = `<p class="count">Nessun articolo. Premi “Nuovo articolo” per iniziare.</p>`; return; }

    list.innerHTML = sorted.map(a=>{
      const badge = a.status==='published'
        ? '<span class="badge badge-pub">● Pubblicato</span>'
        : '<span class="badge badge-draft">○ Bozza</span>';
      const toggleLbl = a.status==='published' ? 'Metti in bozza' : 'Pubblica';
      return `
      <div class="adm-row" data-id="${esc(a.id)}">
        <img class="thumb" src="${esc(a.cover||'')}" alt="" onerror="this.style.visibility='hidden'" />
        <div class="info">
          <h4>${esc(a.title||'(senza titolo)')}</h4>
          <div class="sub">${badge}<span class="badge badge-cat">${esc(a.category||'—')}</span><span>${fmtDate(a.date)}</span></div>
        </div>
        <div class="acts">
          <button data-do="edit">✎ Modifica</button>
          <button data-do="preview">👁 Anteprima</button>
          <a href="articolo.html?slug=${encodeURIComponent(a.slug||'')}&preview=1" target="_blank" rel="noopener">↗ Apri</a>
          <button data-do="toggle">${toggleLbl}</button>
          <button data-do="dup">⧉ Duplica</button>
          <button data-do="del" class="del">🗑</button>
        </div>
      </div>`;
    }).join('');

    list.querySelectorAll('.adm-row').forEach(row=>{
      const id = row.dataset.id;
      row.querySelectorAll('[data-do]').forEach(btn=>{
        btn.addEventListener('click', ()=>rowAction(btn.dataset.do, id));
      });
    });
  }

  function rowAction(action, id){
    const idx = articles.findIndex(a=>a.id===id);
    if(idx<0) return;
    const a = articles[idx];
    if(action==='edit'){ openEditor(a); }
    else if(action==='preview'){ openPreview(a); }
    else if(action==='toggle'){ a.status = a.status==='published'?'draft':'published'; persist(); renderList(); toast(a.status==='published'?'Articolo pubblicato (ricordati di esportare)':'Rimesso in bozza'); }
    else if(action==='dup'){
      const copy = JSON.parse(JSON.stringify(a));
      copy.id = 'art-'+Date.now(); copy.title = a.title+' (copia)';
      copy.slug = slugify(copy.title); copy.status='draft'; copy.date = todayISO();
      articles.unshift(copy); persist(); renderList(); toast('Articolo duplicato come bozza');
    }
    else if(action==='del'){
      if(confirm(`Eliminare definitivamente “${a.title}”?\n(la modifica diventa effettiva sul sito solo dopo l'export)`)){
        articles.splice(idx,1); persist(); renderList(); toast('Articolo eliminato');
      }
    }
  }

  // ---------- editor ----------
  function refreshDatalists(){
    const cats = [...new Set(articles.map(a=>a.category).filter(Boolean))].sort();
    $('catlist').innerHTML = cats.map(c=>`<option value="${esc(c)}"></option>`).join('');
  }

  function openEditor(a){
    editingId = a ? a.id : null;
    refreshDatalists();
    $('f-title').value   = a ? (a.title||'') : '';
    $('f-slug').value    = a ? (a.slug||'') : '';
    $('f-date').value    = a ? (a.date||todayISO()) : todayISO();
    $('f-category').value= a ? (a.category||'') : '';
    $('f-tags').value    = a ? (a.tags||[]).join(', ') : '';
    $('f-status').value  = a ? (a.status||'draft') : 'draft';
    $('f-cover').value   = a ? (a.cover||'') : '';
    $('f-excerpt').value = a ? (a.excerpt||'') : '';
    $('f-body').innerHTML= a ? (a.body||'') : '';
    updateCoverPreview();
    showEdit();
    $('f-title').focus();
  }

  function readForm(){
    const title = $('f-title').value.trim();
    let slug = $('f-slug').value.trim(); if(!slug) slug = slugify(title);
    const bodyHtml = sanitizeEditor($('f-body').innerHTML);
    let excerpt = $('f-excerpt').value.trim();
    if(!excerpt){
      const tmp = document.createElement('div'); tmp.innerHTML = bodyHtml;
      tmp.querySelectorAll('p,h2,h3,li,blockquote,br').forEach(el => el.append(' '));
      excerpt = (tmp.textContent||'').replace(/\s+/g,' ').trim().slice(0,160);
    }
    return {
      id: editingId || ('art-'+Date.now()),
      slug, title,
      excerpt,
      cover: $('f-cover').value.trim(),
      category: $('f-category').value.trim(),
      tags: $('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
      date: $('f-date').value || todayISO(),
      status: $('f-status').value,
      body: bodyHtml
    };
  }

  // riusa sanitize + aggiunge target/rel ai link esterni
  function sanitizeEditor(html){
    const tpl = document.createElement('template');
    tpl.innerHTML = sanitize(html);
    tpl.content.querySelectorAll('a[href]').forEach(a=>{
      const href = a.getAttribute('href')||'';
      if(/^https?:\/\//i.test(href)){ a.setAttribute('target','_blank'); a.setAttribute('rel','noopener'); }
    });
    return tpl.innerHTML.trim();
  }

  function saveArticle(){
    const art = readForm();
    if(!art.title){ alert('Inserisci almeno il titolo.'); $('f-title').focus(); return; }
    // slug univoco
    const clash = articles.find(a=>a.slug===art.slug && a.id!==art.id);
    if(clash) art.slug = art.slug + '-' + Date.now().toString().slice(-4);

    const idx = articles.findIndex(a=>a.id===art.id);
    if(idx>=0) articles[idx] = art; else articles.unshift(art);
    editingId = art.id;
    persist();
    toast('Salvato ✓  (ricordati di esportare)');
    showList();
  }

  // ---------- WYSIWYG ----------
  const editor = $('f-body');
  try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch(e){}
  let savedRange = null;
  function saveSel(){ const s = getSelection(); if(s && s.rangeCount && editor.contains(s.anchorNode)) savedRange = s.getRangeAt(0); }
  function restoreSel(){ if(savedRange){ const s = getSelection(); s.removeAllRanges(); s.addRange(savedRange); } }
  ['keyup','mouseup','blur'].forEach(ev=>editor.addEventListener(ev, saveSel));

  $('toolbar').querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('mousedown', e=>e.preventDefault());
    btn.addEventListener('click', ()=>{
      editor.focus(); restoreSel();
      const act = btn.dataset.act;
      if(act==='link') return doLink();
      if(act==='image') return doImage();
      document.execCommand(btn.dataset.cmd, false, btn.dataset.val || null);
    });
  });

  function doLink(){
    const url = prompt('URL del link (https://...)', 'https://');
    if(url && url.trim()){ editor.focus(); restoreSel(); document.execCommand('createLink', false, url.trim()); }
  }
  function doImage(){
    const url = prompt("URL dell'immagine.\n\nLascia vuoto e premi OK per caricare un file dal computer.", '');
    if(url===null) return;
    if(url.trim()){ editor.focus(); restoreSel(); document.execCommand('insertImage', false, url.trim()); }
    else { $('bodyImgFile').click(); }
  }
  $('bodyImgFile').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = () => { editor.focus(); restoreSel(); document.execCommand('insertImage', false, r.result); };
    r.readAsDataURL(file); e.target.value='';
  });

  // ---------- cover ----------
  function updateCoverPreview(){
    const v = $('f-cover').value.trim(); const img = $('coverPreview');
    if(v){ img.src = v; img.style.display='block'; img.onerror=()=>{img.style.display='none';}; }
    else img.style.display='none';
  }
  $('f-cover').addEventListener('input', updateCoverPreview);
  $('btnCoverUpload').addEventListener('click', ()=>$('coverFile').click());
  $('coverFile').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = () => { $('f-cover').value = r.result; updateCoverPreview(); toast('Copertina caricata (verrà inglobata nel file)'); };
    r.readAsDataURL(file); e.target.value='';
  });
  // slug auto dal titolo (solo se slug vuoto o stiamo creando)
  $('f-title').addEventListener('input', ()=>{
    if(!editingId && !$('f-slug').dataset.touched){ $('f-slug').value = slugify($('f-title').value); }
  });
  $('f-slug').addEventListener('input', ()=>{ $('f-slug').dataset.touched = '1'; });

  // ---------- anteprima ----------
  function openPreview(a){
    const art = a || readForm();
    const cover = art.cover ? `<img class="article-cover" src="${esc(art.cover)}" alt="${esc(art.title)}" />` : '';
    const tags = (art.tags||[]).length ? `<div class="article-tags">${art.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join('')}</div>` : '';
    const draft = art.status!=='published' ? '<span class="badge badge-draft">Bozza · anteprima</span>' : '';
    $('modalTitle').textContent = 'Anteprima articolo';
    $('modalBody').innerHTML = `
      <article class="article">
        <h1>${esc(art.title||'(senza titolo)')}</h1>
        <div class="article-meta">
          <span class="badge badge-cat">${esc(art.category||'Articolo')}</span>
          <span>${fmtDate(art.date)}</span>${draft}
        </div>
        ${cover}
        <div class="article-body">${sanitize(art.body)}</div>
        ${tags}
      </article>`;
    openModal();
  }
  function openModal(){ $('modalBg').classList.add('open'); }
  function closeModal(){ $('modalBg').classList.remove('open'); }
  $('modalClose').addEventListener('click', closeModal);
  $('modalBg').addEventListener('click', e=>{ if(e.target===$('modalBg')) closeModal(); });

  // ---------- export ----------
  const FILE_HEADER =
`/* =========================================================================
   MotoDeals — Archivio articoli (fonte dati del blog)
   Generato dal pannello admin.html — per pubblicare le modifiche sul sito,
   sostituisci questo file nella cartella e ricarica il sito online.
   ========================================================================= */
`;
  function exportFile(){
    const content = FILE_HEADER + 'window.MOTODEALS_ARTICLES = ' + JSON.stringify(articles, null, 2) + ';\n';
    const blob = new Blob([content], {type:'text/javascript;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'articles-data.js';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    $('modalTitle').textContent = 'File esportato ✓';
    $('modalBody').innerHTML = `
      <div style="font-size:15px;line-height:1.65;color:var(--muted)">
        <p style="margin-bottom:14px;color:#fff;font-weight:600">È stato scaricato il file <b style="color:var(--orange)">articles-data.js</b>.</p>
        <p style="margin-bottom:10px">Per renderlo visibile sul sito:</p>
        <ol style="margin:0 0 14px 20px;display:grid;gap:8px">
          <li>Sposta il file scaricato nella cartella <b>motodeals-site/</b>, sostituendo quello esistente.</li>
          <li>Ricarica/ripubblica il sito (oppure aggiorna la pagina se lo apri in locale).</li>
        </ol>
        <p style="font-size:13.5px;color:var(--muted-2)">Gli articoli in <b>bozza</b> restano nel file ma non vengono mostrati al pubblico.</p>
      </div>`;
    openModal();
  }

  // ---------- bottoni ----------
  $('btnNew').addEventListener('click', ()=>openEditor(null));
  $('btnBack').addEventListener('click', showList);
  $('btnBack2').addEventListener('click', showList);
  $('btnSave').addEventListener('click', saveArticle);
  $('btnSave2').addEventListener('click', saveArticle);
  $('btnPreview').addEventListener('click', ()=>openPreview(null));
  $('btnPreview2').addEventListener('click', ()=>openPreview(null));
  $('btnExport').addEventListener('click', exportFile);
  $('btnReset').addEventListener('click', ()=>{
    if(confirm('Ripristinare gli articoli dal file pubblicato (articles-data.js)?\nLe modifiche locali non esportate andranno perse.')){
      articles = JSON.parse(JSON.stringify(window.MOTODEALS_ARTICLES || []));
      persist(); renderList(); toast('Ripristinato dal file pubblicato');
    }
  });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  // ---------- avvio ----------
  renderList();
</script>
</body>
</html>
